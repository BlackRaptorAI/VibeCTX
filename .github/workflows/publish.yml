name: Publish

# Trusted publishing: npmjs.com package settings must list this repo + workflow
# as a Trusted Publisher. No tokens, no OTP — OIDC proves the artifact came
# from this workflow, and --provenance attaches the verifiable attestation.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # NOTE: no registry-url here — it writes a token-based .npmrc whose
          # placeholder NODE_AUTH_TOKEN preempts the OIDC trusted-publishing
          # exchange (observed: provenance signed, then PUT 404'd on bad auth).
      - run: npm install -g npm@latest # bundled npm predates trusted publishing
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --provenance
