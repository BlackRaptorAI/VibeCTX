name: Publish

# Trusted publishing: npmjs.com package settings must list this repo + workflow
# as a Trusted Publisher. No tokens, no OTP — OIDC proves the artifact came
# from this workflow, and --provenance attaches the verifiable attestation.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npm publish --access public --provenance
